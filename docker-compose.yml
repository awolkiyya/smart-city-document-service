services:

  document-service:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: document-service

    restart: unless-stopped

    environment:
      NODE_ENV: production
      PORT: 3000
      STORAGE_PATH: /app/storage

    expose:
      - "3000"

    volumes:
      - document_storage:/app/storage

    networks:
      - backend

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/documents/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  nginx:
    image: nginx:alpine
    container_name: document-nginx

    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - document-service

    networks:
      - backend


networks:
  backend:
    driver: bridge

volumes:
  document_storage: