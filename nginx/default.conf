server {
    listen 80;
    server_name 196.190.213.40;

    # =========================
    # Security headers
    # =========================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # =========================
    # Upload / body size limit
    # =========================
    client_max_body_size 50M;

    # =========================
    # API ROUTING (IMPORTANT FIX)
    # =========================
    location /api/ {
        proxy_pass http://document-service:3000/api/;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_buffering off;
    }

    # =========================
    # HEALTH CHECK (CLEAN FIX)
    # =========================
    location /health {
        proxy_pass http://document-service:3000/api/documents/health;

        access_log off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # =========================
    # OPTIONAL: ROOT REDIRECT (avoid confusion)
    # =========================
    location / {
        return 200 "Document service is running\n";
    }
}